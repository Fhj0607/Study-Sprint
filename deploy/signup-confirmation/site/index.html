<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Sprint</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #5b6472;
        --accent: #3b82f6;
        --border: #d9e2ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, #e6f1ff 0%, transparent 45%),
          linear-gradient(180deg, var(--bg) 0%, #eef3f8 100%);
        font-family: Arial, sans-serif;
        color: var(--text);
      }

      .card {
        width: min(100%, 560px);
        padding: 40px 28px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.7rem);
        line-height: 1.1;
      }

      p {
        margin: 16px 0 0;
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Study Sprint</p>
      <h1>Thank you for signing up.</h1>
      <p>Your email has been confirmed. You can now sign in to your account in the Study Sprint app.</p>
    </main>
  </body>
</html>
